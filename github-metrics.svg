<svg width="960" height="360" viewBox="0 0 960 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Metrics placeholder</title>
  <desc id="desc">A placeholder card indicating that GitHub metrics will appear after GitHub Actions is configured.</desc>
  <defs>
    <linearGradient id="bg" x1="92" y1="44" x2="868" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5EBDD"/>
      <stop offset="1" stop-color="#E9DCC8"/>
    </linearGradient>
  </defs>
  <rect x="18" y="18" width="924" height="324" rx="28" fill="url(#bg)"/>
