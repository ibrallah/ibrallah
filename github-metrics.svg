  <text x="72" y="104" fill="#44372E" font-family="Georgia, 'Times New Roman', serif" font-size="34">GitHub signals</text>
  <text x="72" y="152" fill="#725F51" font-family="Arial, Helvetica, sans-serif" font-size="22">The live overview card will appear here after the Metrics workflow runs.</text>
  <text x="72" y="190" fill="#725F51" font-family="Arial, Helvetica, sans-serif" font-size="22">Add the METRICS_TOKEN secret, then trigger the action once.</text>
